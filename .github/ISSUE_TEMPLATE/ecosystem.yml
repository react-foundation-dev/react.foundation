name: Ecosystem Library Request
description: Suggest a library for the Supported Ecosystem
title: "Ecosystem: <library name>"
labels: ["type:ecosystem", "status:needs-info"]
body:
  - type: input
    id: name
    attributes:
      label: Library Name
    validations:
      required: true
  - type: input
    id: repo
    attributes:
      label: Repository URL
    validations:
      required: true
  - type: textarea
    id: reason
    attributes:
      label: Why should this be included?
      placeholder: Adoption, impact, relevance
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence of React ecosystem relevance
      placeholder: Usage, community adoption, docs quality, compatibility, or maintainer activity
    validations:
      required: true
  - type: textarea
    id: non_goals
    attributes:
      label: Non-goals
      description: Optional. Anything this request should not imply or change.
